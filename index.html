<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .quiz { max-width: 600px; margin: auto; }
        .question { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="quiz">
        <h1>Spelling Quiz</h1>
        <div id="questions"></div>
        <button id="submit">Submit</button>
        <div id="result"></div>
    </div>
    <script>
        const questions = [
            { question: 'How do you spell the word that means "to see with your eyes"?', answer: 'see' },
            { question: 'How do you spell the word that is a device for measuring time?', answer: 'clock' },
            { question: 'How do you spell the word that means "to make a mark"?', answer: 'write' }
        ];

        const questionsContainer = document.getElementById('questions');
        questions.forEach((q, index) => {
            const questionEl = document.createElement('div');
            questionEl.className = 'question';
            questionEl.innerHTML = `<label>${q.question}</label><input type='text' id='answer-${index}' />`;
            questionsContainer.appendChild(questionEl);
        });

        document.getElementById('submit').addEventListener('click', () => {
            let score = 0;
            questions.forEach((q, index) => {
                const userAnswer = document.getElementById(
                    `answer-${index}`
                ).value;
                if (userAnswer.toLowerCase() === q.answer) {
                    score++;
                }
            });
            const resultEl = document.getElementById('result');
            resultEl.innerHTML = `You scored ${score} out of ${questions.length}!`;
        });
    </script>
</body>
</html>
